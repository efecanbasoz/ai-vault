version: '3.8'

services:
  aivault:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${API_PORT:-3000}:3000"
    env_file:
      - ../.env
    volumes:
      - ../vault:/app/vault
      - aivault-data:/app/data
    restart: unless-stopped

volumes:
  aivault-data:
